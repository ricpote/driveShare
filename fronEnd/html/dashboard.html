<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <main class="app-shell dashboard-shell">
    <header class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p id="welcomeText">Bem-vindo ao UniRide</p>
      </div>
      <div class="topbar-actions">
        <a href="rides.html"><button class="secondary-btn">Ver boleias</button></a>
        <a href="account.html"><button class="secondary-btn">Conta</button></a>
        <button id="logoutBtn" class="primary-btn topbar-primary">Logout</button>
      </div>
    </header>

    <section class="dashboard-single">
      <div class="card ride-form-card wide-card">
        <h2 class="page-title">Criar boleia</h2>
        <div id="rideMessage" class="message hidden"></div>

        <form id="rideForm" class="styled-form">
          <div class="form-grid two-columns align-end">
            <div>
              <label for="origin">Origem</label>
              <div class="origin-input-row">
                <input type="text" id="origin" placeholder="Ex: Corroios ou Rua da Liberdade, Almada" required />
                <button type="button" id="findOriginBtn" class="secondary-btn map-search-btn">Encontrar no mapa</button>
              </div>
              <p class="helper-text helper-text-tight">Escreve uma zona, rua ou local e carrega em “Encontrar no mapa”.</p>
            </div>

            <div>
              <label for="time">Hora de partida</label>
              <input type="time" id="time" required />
            </div>
          </div>

          <label>Ponto de partida no mapa</label>
          <div id="createRideMap"></div>
          <p class="helper-text helper-text-tight">Clica no mapa para marcar o ponto de partida da boleia ou pesquisa a origem pelo nome.</p>

          <input type="hidden" id="startLat" />
          <input type="hidden" id="startLng" />

          <div class="form-grid two-columns">
            <div>
              <label for="seats">Lugares disponíveis</label>
              <input type="number" id="seats" min="1" max="8" placeholder="Ex: 3" required />
            </div>

            <div>
              <label for="rideComment">Comentário</label>
              <textarea id="rideComment" rows="4" placeholder="Ex: Passo pela estação de Corroios, posso esperar 5 minutos."></textarea>
            </div>
          </div>

          <button type="submit" class="primary-btn">Guardar boleia</button>
        </form>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
