<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p id="welcomeText">Bem-vindo ao UniRide</p>
      </div>
      <div class="topbar-actions">
        <a href="rides.html"><button class="secondary-btn">Ver boleias</button></a>
        <button id="logoutBtn" class="primary-btn">Logout</button>
      </div>
    </header>

    <section class="dashboard-grid">
      <div class="card">
        <h2 class="page-title">Criar boleia</h2>
        <div id="rideMessage" class="message hidden"></div>

        <form id="rideForm" class="styled-form">
          <label for="origin">Origem</label>
          <input type="text" id="origin" placeholder="Ex: Almada" required />

         

          <label for="time">Hora de partida</label>
          <input type="time" id="time" required />

          <label for="seats">Lugares disponíveis</label>
          <input type="number" id="seats" min="1" max="8" placeholder="Ex: 3" required />

          <button type="submit" class="primary-btn">Guardar boleia</button>
        </form>
      </div>

      <div class="card">
        <h2 class="page-title">Impacto estimado</h2>
        <p>Uma boleia partilhada reduz carros na estrada e ajuda a diminuir emissões.</p>
        <div class="stats">
          <div class="stat">
            <strong id="totalRides">0</strong>
            <span>Boleias criadas</span>
          </div>
          <div class="stat">
            <strong id="totalSeats">0</strong>
            <span>Lugares disponíveis</span>
          </div>
          <div class="stat">
            <strong id="co2Saved">0 kg</strong>
            <span>CO₂ estimado poupado</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/main.js"></script>
</body>
</html>
