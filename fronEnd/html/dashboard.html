<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p id="welcomeText">Bem-vindo ao UniRide</p>
      </div>
      <div class="topbar-actions">
        <a href="rides.html"><button class="secondary-btn">Ver boleias</button></a>
        <button id="logoutBtn" class="primary-btn">Logout</button>
      </div>
    </header>

    <section class="dashboard-grid">
      <div class="card">
        <h2 class="page-title">Criar boleia</h2>
        <div id="rideMessage" class="message hidden"></div>

        <form id="rideForm" class="styled-form">
          <label for="origin">Origem</label>
          <input type="text" id="origin" placeholder="Escolhe no mapa ou escreve manualmente" required />

          <label>Ponto de partida no mapa</label>
          <div id="createRideMap"></div>
          <p class="helper-text">Clica no mapa para marcar o ponto de partida da boleia.</p>

          <input type="hidden" id="startLat" />
          <input type="hidden" id="startLng" />

          <label for="time">Hora de partida</label>
          <input type="time" id="time" required />

          <label for="seats">Lugares disponíveis</label>
          <input type="number" id="seats" min="1" max="8" placeholder="Ex: 3" required />

          <button type="submit" class="primary-btn">Guardar boleia</button>
        </form>
      </div>

      
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
