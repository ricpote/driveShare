<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
  <main class="app-shell dashboard-shell">
    <header class="topbar">
      <div>
        <h1>Marcar Viagem</h1>
        <p id="welcomeText">Bem-vindo ao UniRide</p>
      </div>

      <div class="topbar-actions">
        <a href="rides.html" class="secondary-btn nav-btn">Viagens</a>
        <a href="account.html" class="secondary-btn nav-btn">Conta</a>
        <button id="logoutBtn" class="primary-btn topbar-primary" type="button">Terminar sessão</button>
      </div>
    </header>

    <section class="dashboard-single">
      <div class="card ride-form-card wide-card">
        <h2 class="page-title">Criar boleia</h2>
        <div id="rideMessage" class="message hidden"></div>

        <form id="rideForm" class="styled-form">
          <div class="form-grid vertical-layout">
            <div class="datetime-row">
              <div class="datetime-item">
                <label for="date">Data da partida</label>
                <input type="date" id="date" required />
              </div>

              <div class="datetime-item">
                <label for="time">Hora da partida</label>
                <input type="time" id="time" required />
              </div>
            </div>

            <div class="datetime-row">
              <div class="datetime-item">
                <label for="arrivalDate">Data de chegada</label>
                <input type="date" id="arrivalDate" required />
              </div>

              <div class="datetime-item">
                <label for="arrivalTime">Hora de chegada</label>
                <input type="time" id="arrivalTime" required />
              </div>
            </div>

            <div class="origin-row">
              <label for="origin">Origem</label>
              <div class="origin-input-row">
                <input type="text" id="origin" placeholder="Ex: Corroios ou Rua da Liberdade, Almada" required />
                <button type="button" id="findOriginBtn" class="secondary-btn map-search-btn">
                  Encontrar no mapa
                </button>
              </div>
            </div>

            <div class="origin-row">
              <label for="destination">Destino</label>
              <div class="origin-input-row">
                <input type="text" id="destination" placeholder="Ex: FCT NOVA" required />
                <button type="button" id="findDestinationBtn" class="secondary-btn map-search-btn">
                  Encontrar no mapa
                </button>
              </div>
            </div>
          </div>

          <label>Mapa</label>

          <div class="map-mode-selector">
            <label class="radio-option">
              <input type="radio" name="mapMode" value="origin" checked />
              <span>Origem</span>
            </label>

            <label class="radio-option">
              <input type="radio" name="mapMode" value="destination" />
              <span>Destino</span>
            </label>
          </div>

          <p id="mapModeInfo" class="helper-text helper-text-tight">
            Seleção ativa: origem. Clica no mapa para definir a morada.
          </p>

          <div id="createRideMap"></div>

          <p class="helper-text helper-text-tight">
            Podes escrever a morada e procurar no mapa, ou clicar diretamente no mapa. O ponto vai preencher o campo
            selecionado.
          </p>

          <input type="hidden" id="startLat" />
          <input type="hidden" id="startLng" />
          <input type="hidden" id="destinationLat" />
          <input type="hidden" id="destinationLng" />

          <div class="form-grid two-columns">
            <div>
              <label for="seats">Lugares disponíveis</label>
              <input type="number" id="seats" min="1" max="8" placeholder="Ex: 3" required />
            </div>

            <div>
              <label for="rideComment">Comentário</label>
              <textarea id="rideComment" rows="4"
                placeholder="Ex: Passo pela estação de Corroios, posso esperar 5 minutos."></textarea>
            </div>
          </div>

          <button type="submit" class="primary-btn">Guardar boleia</button>
        </form>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../js/dashboard.js"></script>
</body>

</html>
