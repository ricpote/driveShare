<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Viagens</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo">🚗</span>
        <span class="sidebar-name">UniRide</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span>Criar boleia</span>
        </a>
        <a href="rides.html" class="nav-item active">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
            <line x1="8" y1="2" x2="8" y2="18"/>
            <line x1="16" y1="6" x2="16" y2="22"/>
          </svg>
          <span>Viagens</span>
        </a>
        <a href="account.html" class="nav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Conta</span>
        </a>
      </nav>
      <div class="sidebar-divider"></div>
      <button id="logoutBtn" class="sidebar-logout">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Terminar sessão</span>
      </button>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <div class="page-header">
        <h1>Viagens disponíveis</h1>
        <p>Encontra estudantes que vão para a mesma universidade.</p>
      </div>

      <div id="ridesMessage" class="message hidden"></div>

      <div class="rides-layout">

        <!-- Map Section -->
        <div class="mapcard rides-map-top">
          <div class="section-top">
            <span class="card-title" style="margin-bottom:0">Mapa de boleias</span>
            <button id="refreshRidesBtn" class="secondary-btn small-btn">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
              Atualizar
            </button>
          </div>
          <div id="map"></div>
        </div>

        <!-- List Section -->
        <div class="card list-card rides-list-bottom">
          <div class="section-top">
            <span class="card-title" style="margin-bottom:0">Lista de boleias</span>
          </div>

          <!-- Filters -->
          <div class="rides-filters">
            <div class="filter-item">
              <label for="filterDate">Data</label>
              <input type="date" id="filterDate" />
            </div>
            <div class="filter-item">
              <label for="filterDepartureTime">Hora de partida</label>
              <input type="time" id="filterDepartureTime" />
            </div>
            <div class="filter-item">
              <label for="filterArrivalTime">Hora de chegada</label>
              <input type="time" id="filterArrivalTime" />
            </div>
            <div class="filter-actions">
              <button id="applyFiltersBtn" class="inline-btn small-btn">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                </svg>
                Filtrar
              </button>
              <button id="clearFiltersBtn" class="secondary-btn small-btn">Limpar</button>
            </div>
          </div>

          <!-- Rides list -->
          <div id="ridesContainer" class="rides-scroll-list">
            <div class="empty-state">A carregar boleias...</div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../js/rides.js"></script>
</body>

</html>
