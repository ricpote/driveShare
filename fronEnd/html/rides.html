<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Boleias</title>

  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
  <main class="app-shell rides-shell">
    <header class="topbar">
      <div>
        <h1>Viagens disponíveis</h1>
        <p>Encontra estudantes que vão para a mesma universidade.</p>
      </div>

      <div class="topbar-actions">
        <a href="dashboard.html" class="secondary-btn nav-btn">Marcar Viagem</a>
        <a href="account.html" class="secondary-btn nav-btn">Conta</a>
        <button id="logoutBtn" class="primary-btn topbar-primary" type="button">Terminar sessão</button>
      </div>
    </header>

    <section class="mapcard rides-map-top">
      <div class="section-top">
        <h2 class="page-title">Mapa de Viagens</h2>
      </div>
      <div id="map"></div>
    </section>

    <section class="card list-card rides-list-bottom">
      <div class="section-top">
        <h2 class="page-title">Lista de Viagens</h2>
        <button type="button" id="refreshRidesBtn" class="secondary-btn">Atualizar</button>
      </div>

      <div class="rides-filters">
        <div class="filter-item">
          <label for="filterDate">Dia</label>
          <input type="date" id="filterDate" />
        </div>

        <div class="filter-item">
          <label for="filterDepartureTime">Hora de partida</label>
          <input type="time" id="filterDepartureTime" />
        </div>

        <div class="filter-item">
          <label for="filterArrivalTime">Hora de chegada</label>
          <input type="time" id="filterArrivalTime" />
        </div>

        <div class="filter-actions">
          <button type="button" id="applyFiltersBtn" class="secondary-btn">Filtrar</button>
          <button type="button" id="clearFiltersBtn" class="secondary-btn">Limpar</button>
        </div>
      </div>

      <div id="ridesMessage" class="message hidden"></div>
      <div id="ridesContainer" class="rides-scroll-list"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../js/rides.js"></script>
</body>

</html>
