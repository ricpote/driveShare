<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Perfil do utilizador</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <main class="app-shell account-page">
    <header class="topbar">
      <div>
        <h1>Perfil do utilizador</h1>
        <p>Consulta os dados deste utilizador.</p>
      </div>

      <div class="topbar-actions">
        <a href="account.html" class="secondary-btn nav-btn">Voltar</a>
      </div>
    </header>

    <section class="account-layout">
      <div class="card account-main-card">
        <h2 class="page-title">Resumo da conta</h2>

        <div class="stats">
          <div class="stat">
            <strong id="userRating">—</strong>
            <span>Rating médio</span>
          </div>

          <div class="stat">
            <strong id="ratingCount">0</strong>
            <span>Total de avaliações</span>
          </div>

          <div class="stat">
            <strong id="co2Saved">0 kg</strong>
            <span>CO₂ estimado poupado</span>
          </div>
        </div>

        <div class="account-user-block">
          <h3 class="section-subtitle">Informações do utilizador</h3>

          <div class="user-info-grid" id="userInfoGrid">
            <div class="info-item">
              <span class="info-label">Nome</span>
              <strong id="userName">—</strong>
            </div>

            <div class="info-item">
              <span class="info-label">Email</span>
              <strong id="userEmail">—</strong>
            </div>

            <div class="info-item">
              <span class="info-label">Telemóvel</span>
              <strong id="userPhone">—</strong>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/user-profile.js"></script>
</body>

</html>
