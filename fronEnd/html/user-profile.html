<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Perfil do utilizador</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo">🚗</span>
        <span class="sidebar-name">UniRide</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span>Criar boleia</span>
        </a>
        <a href="rides.html" class="nav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
            <line x1="8" y1="2" x2="8" y2="18"/>
            <line x1="16" y1="6" x2="16" y2="22"/>
          </svg>
          <span>Viagens</span>
        </a>
        <a href="account.html" class="nav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Conta</span>
        </a>
      </nav>
      <div class="sidebar-divider"></div>
      <button class="sidebar-logout" onclick="localStorage.removeItem('token'); window.location.href='./index.html'">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Terminar sessão</span>
      </button>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <div class="page-header">
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:4px;">
          <a href="account.html" class="secondary-btn small-btn">← Voltar</a>
        </div>
        <h1>Perfil do utilizador</h1>
        <p>Consulta os dados deste utilizador.</p>
      </div>

      <section class="account-layout">

        <!-- Profile Summary Card -->
        <div class="card">
          <h2 class="card-title">Resumo do utilizador</h2>

          <!-- Stats -->
          <div class="stats">
            <div class="stat">
              <strong id="userRating">—</strong>
              <span>Avaliação</span>
            </div>
            <div class="stat">
              <strong id="ratingCount">—</strong>
              <span>Avaliações recebidas</span>
            </div>
            <div class="stat">
              <strong id="co2Saved">—</strong>
              <span>CO₂ poupado (kg)</span>
            </div>
          </div>

          <!-- User Info Block -->
          <div class="account-user-block">
            <div class="section-subtitle">
              <span>Dados do utilizador</span>
            </div>

            <div class="user-info-grid">
              <div class="info-item">
                <span class="info-label">Nome</span>
                <strong id="userName">—</strong>
              </div>
              <div class="info-item">
                <span class="info-label">Email</span>
                <strong id="userEmail">—</strong>
              </div>
              <div class="info-item">
                <span class="info-label">Telemóvel</span>
                <strong id="userPhone">—</strong>
              </div>
            </div>
          </div>
        </div>

      </section>
    </main>

  </div>

  <script src="../js/user-profile.js"></script>
</body>

</html>
