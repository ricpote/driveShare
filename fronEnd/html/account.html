<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniRide | Conta</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
  <main class="app-shell account-page">
    <header class="topbar">
      <div>
        <h1>A minha conta</h1>
        <p>Consulta os teus dados e atividade no UniRide.</p>
      </div>

      <div class="topbar-actions">
        <a href="dashboard.html" class="secondary-btn nav-btn">Marcar Viagem</a>
        <a href="rides.html" class="secondary-btn nav-btn">Viagens</a>
        <button id="logoutBtn" class="primary-btn topbar-primary" type="button">Terminar sessão</button>
      </div>
    </header>

    <section class="account-layout">
      <div class="card rides-active-card">
        <h2 class="page-title">Boleias marcadas</h2>
        <div id="rideActiveContainer"></div>
      </div>

      <div class="card">
        <div class="history-header">
          <h2 class="page-title">Histórico de boleias</h2>
        </div>

        <div id="rideHistory">
          <div class="empty-state">
            Ainda não tens histórico de boleias.
          </div>
        </div>
      </div>

      <div class="card account-main-card">
        <h2 class="page-title">Resumo da conta</h2>

        <div class="stats">
          <div class="stat">
            <strong id="totalRides">0</strong>
            <span>Boleias criadas</span>
          </div>

          <div class="stat">
            <strong id="userRating">—</strong>
            <span>Rating médio</span>
          </div>

          <div class="stat">
            <strong id="co2Saved">0 kg</strong>
            <span>CO₂ estimado poupado</span>
          </div>
        </div>

        <div class="account-user-block">
          <h3 class="section-subtitle">
            Dados pessoais
            <button id="editUserBtn" class="secondary-btn small-btn" type="button">Editar</button>
          </h3>

          <div class="user-info-grid" id="userInfoGrid">
            <div class="info-item">
              <span class="info-label">Nome</span>
              <strong id="userName">—</strong>
            </div>

            <div class="info-item">
              <span class="info-label">Email</span>
              <strong id="userEmail">—</strong>
            </div>

            <div class="info-item">
              <span class="info-label">Telemóvel</span>
              <strong id="userPhone">—</strong>
            </div>
          </div>

          <form id="editUserForm" class="account-edit-form" style="display: none; margin-top: 1rem;">
            <div class="user-info-grid">
              <div class="info-item">
                <label class="info-label" for="editName">Nome</label>
                <input id="editName" name="name" type="text" class="auth-input" placeholder="O teu nome" required />
              </div>

              <div class="info-item">
                <label class="info-label" for="editPhone">Telemóvel</label>
                <input id="editPhone" name="phone" type="text" class="auth-input" placeholder="O teu telemóvel"
                  required />
              </div>
            </div>

            <div class="topbar-actions" style="margin-top: 1rem; justify-content: flex-start;">
              <button id="saveUserBtn" type="submit" class="primary-btn small-btn">Guardar</button>
              <button id="cancelEditUserBtn" type="button" class="secondary-btn small-btn">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../js/account.js"></script>
</body>

</html>
